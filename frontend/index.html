<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Chatbot Pháp Luật</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <form id="loginForm" class="login-form">
            <h2>Đăng nhập</h2>
            <div id="errorMessage" class="error-message hidden"></div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" id="loginBtn">Đăng nhập</button>
            <p class="register-link">Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
        </form>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api-selector.js"></script>
    <script>
        // Chờ API ready
        window.addEventListener('api-ready', () => {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');

            // Kiểm tra nếu đã đăng nhập -> chuyển chat
            if (isAuthenticated()) {
                window.location.href = 'chat.html';
                return;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                clearError(errorDiv);
                const originalText = btn.textContent;
                showLoading(btn);
                try {
                    await window.login(emailInput.value.trim(), passwordInput.value);
                    window.location.href = 'chat.html';
                } catch (err) {
                    const msg = err.data?.detail || err.message || 'Đăng nhập thất bại';
                    displayError(errorDiv, msg);
                } finally {
                    hideLoading(btn, originalText);
                }
            });
        });
    </script>
</body>
</html>
