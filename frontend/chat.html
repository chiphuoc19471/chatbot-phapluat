<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Pháp Luật</title>
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar lịch sử -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Lịch sử chat</h3>
                <button id="newChatBtn">+ Mới</button>
            </div>
            <div class="history-list" id="historyList">
                <!-- danh sách các hội thoại -->
            </div>
        </aside>
        <!-- Main chat area -->
        <main class="chat-main">
            <div class="chat-header">
                <span>Chatbot Tư vấn Lao động</span>
                <button id="logoutBtn">Đăng xuất</button>
            </div>
            <div class="messages-container" id="messagesContainer">
                <!-- tin nhắn hiển thị ở đây -->
                <div class="empty-chat">Hãy gửi câu hỏi để bắt đầu</div>
            </div>
            <div class="input-area">
                <textarea id="messageInput" placeholder="Nhập câu hỏi của bạn..." rows="2"></textarea>
                <button id="sendBtn">Gửi</button>
            </div>
            <div class="sources-panel" id="sourcesPanel" style="display: none;">
                <strong>Nguồn tham khảo:</strong>
                <div id="sourcesContent"></div>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api-selector.js"></script>
    <script src="js/chat-ui.js"></script>
</body>
</html>
